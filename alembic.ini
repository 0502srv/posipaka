# Alembic Configuration — Posipaka
# Секція 3.1 MASTER.md: schema versioning для SQLite

[alembic]
script_location = alembic
sqlalchemy.url = sqlite+aiosqlite:///%(here)s/memory.db

# Use async SQLAlchemy
# Override in env.py for ~/.posipaka/memory.db path

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
