# Secret patterns for pre-commit hooks and git_helper skill.
# Used by scripts/check_secrets.py

patterns:
  - name: Anthropic API Key
    pattern: 'sk-ant-[A-Za-z0-9\-_]{20,}'
    severity: critical

  - name: OpenAI API Key
    pattern: 'sk-[A-Za-z0-9]{20,}'
    severity: critical

  - name: AWS Access Key
    pattern: 'AKIA[A-Z0-9]{16}'
    severity: critical

  - name: GitHub Personal Access Token
    pattern: 'ghp_[A-Za-z0-9]{36}'
    severity: critical

  - name: GitHub OAuth Token
    pattern: 'gho_[A-Za-z0-9]{36}'
    severity: critical

  - name: GitLab Personal Access Token
    pattern: 'glpat-[A-Za-z0-9\-]{20,}'
    severity: critical

  - name: Slack Bot Token
    pattern: 'xoxb-[A-Za-z0-9\-]+'
    severity: critical

  - name: Slack User Token
    pattern: 'xoxp-[A-Za-z0-9\-]+'
    severity: critical

  - name: Telegram Bot Token
    pattern: '\d{8,10}:[A-Za-z0-9_-]{35}'
    severity: critical

  - name: Private Key
    pattern: '-----BEGIN[A-Z ]*PRIVATE KEY-----'
    severity: critical

  - name: Hardcoded Password
    pattern: 'password\s*[=:]\s*["\x27][^"\x27]{6,}["\x27]'
    severity: high

  - name: Generic Secret Assignment
    pattern: 'secret\s*[=:]\s*["\x27][^"\x27]{8,}["\x27]'
    severity: high

  - name: Google API Key
    pattern: 'AIza[A-Za-z0-9_-]{35}'
    severity: critical

  - name: Stripe Key
    pattern: 'sk_live_[A-Za-z0-9]{24,}'
    severity: critical

  - name: JWT Token
    pattern: 'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
    severity: high

# Files that are always safe to skip (contain patterns by design)
allowlist_files:
  - '.secrets-patterns.yaml'
  - 'scripts/check_secrets.py'
  - 'scripts/check_forbidden_files.py'
  - 'posipaka/skills/builtin/git_helper/tools.py'
  - 'posipaka/security/rotation.py'
  - 'posipaka/core/json_logging.py'
