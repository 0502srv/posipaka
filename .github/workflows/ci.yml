name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]" "ruff>=0.15,<1.0"

      - name: Lint (ruff)
        run: ruff check posipaka/ tests/

      - name: Format check (ruff)
        run: ruff format --check posipaka/ tests/

      - name: Type check (mypy)
        run: mypy posipaka/ --ignore-missing-imports

      - name: Security scan (bandit)
        run: pip install bandit && bandit -r posipaka/ -ll -q

      - name: Vulnerability scan (pip-audit)
        run: pip install pip-audit && pip-audit --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Tests with coverage
        run: pytest --cov=posipaka --cov-report=xml --cov-fail-under=30 -v

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
