name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check posipaka/ tests/

      - name: Format check (ruff)
        run: ruff format --check posipaka/ tests/

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy posipaka/ --ignore-missing-imports

      - name: Security scan (bandit)
        run: pip install bandit && bandit -r posipaka/ -s B101,B104,B603,B607 -q

      - name: Vulnerability scan (pip-audit)
        run: pip install pip-audit && pip-audit --strict || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Tests with coverage
        run: pytest --cov=posipaka --cov-report=xml --cov-fail-under=30 -v

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  verify-signatures:
    name: Verify commit signatures
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for signed commits
        run: |
          UNSIGNED=$(git log --format='%H %GG' origin/main..HEAD 2>/dev/null | grep -c 'N' || echo 0)
          if [ "$UNSIGNED" -gt 0 ]; then
            echo "::warning::$UNSIGNED unsigned commit(s). Consider signing with GPG/SSH."
          fi
