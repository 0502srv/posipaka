<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posipaka Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <h1 class="text-xl font-bold text-purple-400">🐾 Posipaka Dashboard</h1>
            <div class="flex gap-4 items-center">
                <span id="status" class="text-sm text-gray-400">Loading...</span>
                <a href="/logout" class="text-sm text-red-400 hover:text-red-300">Вийти</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Agent Status -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4 text-purple-300">Agent Status</h2>
            <div id="agent-status" hx-get="/api/v1/status" hx-trigger="load, every 30s" hx-swap="innerHTML">
                <div class="animate-pulse bg-gray-700 h-20 rounded"></div>
            </div>
        </div>

        <!-- Health -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4 text-green-300">Health</h2>
            <div id="health" hx-get="/api/v1/health" hx-trigger="load, every 60s" hx-swap="innerHTML">
                <div class="animate-pulse bg-gray-700 h-20 rounded"></div>
            </div>
        </div>

        <!-- Tools -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4 text-blue-300">Tools</h2>
            <div id="tools" hx-get="/api/v1/tools" hx-trigger="load" hx-swap="innerHTML">
                <div class="animate-pulse bg-gray-700 h-20 rounded"></div>
            </div>
        </div>

        <!-- Audit -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 md:col-span-2">
            <h2 class="text-lg font-semibold mb-4 text-yellow-300">Audit Log</h2>
            <div id="audit" hx-get="/api/v1/audit" hx-trigger="load, every 60s" hx-swap="innerHTML">
                <div class="animate-pulse bg-gray-700 h-20 rounded"></div>
            </div>
        </div>

        <!-- Cost -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h2 class="text-lg font-semibold mb-4 text-amber-300">Cost Today</h2>
            <div id="cost" hx-get="/api/v1/status" hx-trigger="load, every 120s" hx-swap="innerHTML">
                <div class="animate-pulse bg-gray-700 h-20 rounded"></div>
            </div>
        </div>
    </main>

    <footer class="text-center text-gray-600 text-sm py-4">
        Posipaka v0.1.0 | <a href="https://docs.posipaka.dev" class="text-purple-500 hover:underline">Docs</a>
    </footer>

    <script src="/static/dashboard.js"></script>
</body>
</html>
