# Глобальні налаштування
settings:
  lazy_loading: true       # true = не запускати сервери автоматично
  timeout_seconds: 30      # Дефолтний таймаут запуску сервера
  max_servers: 10          # Максимум одночасних серверів
  max_concurrent_calls: 5  # Максимум паралельних tool calls на сервер
  allow_private_networks: true  # false = блокувати RFC1918 (10.x, 172.16-31.x, 192.168.x) для cloud
  # allowed_commands:       # Додаткові дозволені команди для stdio transport
  #   - my-custom-server    # За замовчуванням: node, npx, npm, python, python3, uvx, uv, deno, bun, bunx, docker, podman
