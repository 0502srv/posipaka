# MCP (Model Context Protocol) — конфігурація серверів
# Копіюйте в ~/.posipaka/mcp.yaml та налаштуйте
#
# Кожен MCP сервер надає tools які агент може використовувати.
# Пріоритет: builtin skills > integrations > MCP servers
#
# Підтримувані транспорти:
#   - stdio (default) — локальний subprocess
#   - streamable-http — remote HTTP сервер (з опціональною OAuth авторизацією)
#
# Формат серверів — dict (ключ = ім'я сервера):
#   servers:
#     server-name:
#       command: "executable"       # Для stdio transport
#       args: ["arg1", "arg2"]
#       env:
#         KEY: "value"
#         SECRET: "${ENV_VAR}"           # Читає з оточення
#         WITH_DEFAULT: "${VAR:-fallback}" # З дефолтним значенням
#       enabled: true
#       transport: stdio             # або streamable-http
#       timeout: 30
#       auto_start: true   # false = lazy loading (запуск при першому виклику)
#       roots:             # Custom Root paths для list_roots (за замовчуванням: ~/.posipaka/)
#         - "/home/user/docs"
#         - "/home/user/projects"
#
#     remote-server:
#       transport: streamable-http   # HTTP transport для remote серверів
#       url: "http://mcp-server:8000/mcp"
#       headers:                     # Custom HTTP headers
#         Authorization: "Bearer ${API_TOKEN}"
#       oauth:                       # OAuth авторизація (замість headers)
#         client_name: "posipaka"
#         redirect_uri: "http://localhost:3000/callback"
#         scope: "read write"
#       enabled: true

