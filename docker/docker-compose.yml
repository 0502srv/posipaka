# Posipaka Production
services:
  posipaka:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: posipaka
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    volumes:
      - posipaka_data:/home/agent/.posipaka:rw
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.scope=posipaka"
    networks:
      - posipaka_net

  # Auto-update: watchtower перебілдить контейнер при новому образі
  watchtower:
    image: containrrr/watchtower
    container_name: posipaka-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400  # раз на добу
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_SCOPE=posipaka
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "com.centurylinklabs.watchtower.scope=posipaka"
    networks:
      - posipaka_net

volumes:
  posipaka_data:

networks:
  posipaka_net:
    driver: bridge
