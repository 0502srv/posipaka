# Posipaka Production
services:
  posipaka:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: posipaka
    restart: unless-stopped
    env_file:
      - ../.env
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    volumes:
      - posipaka_data:/home/agent/.posipaka:rw
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - posipaka_net

volumes:
  posipaka_data:

networks:
  posipaka_net:
    driver: bridge
