version: "3.8"

services:
  posipaka:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: posipaka-dev
    restart: "no"
    env_file:
      - ../.env
    volumes:
      - ../posipaka:/app/posipaka
      - posipaka_data:/home/agent/.posipaka
    ports:
      - "8080:8080"
    command: ["dev"]

volumes:
  posipaka_data:
